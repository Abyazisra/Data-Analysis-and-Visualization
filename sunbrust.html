<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Data Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin: 0;
            padding: 20px;
        }
        .chart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }
        svg {
            margin: auto;
        }
        .tooltip {
            position: absolute;
            background-color: white;
            border: 1px solid #ccc;
            padding: 5px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            pointer-events: none;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>Stacked Bar Chart</h2>
        <svg id="stacked-bar-chart" width="800" height="400"></svg>
    </div>
    <div class="chart-container">
        <h2>Sunburst Chart</h2>
        <svg id="sunburst-chart" width="800" height="800"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        // Mock sales data for sunburst chart
        const sunburstData = {
            "name": "Sales",
            "children": [
                {
                    "name": "North America",
                    "children": [
                        { "name": "Product A", "size": 1500 },
                        { "name": "Product B", "size": 2500 },
                    ]
                },
                {
                    "name": "Europe",
                    "children": [
                        { "name": "Product A", "size": 1000 },
                        { "name": "Product B", "size": 2000 },
                    ]
                },
                {
                    "name": "Asia",
                    "children": [
                        { "name": "Product A", "size": 700 },
                        { "name": "Product B", "size": 800 },
                    ]
                },
                { "name": "Australia", "size": 1000 },
                { "name": "South America", "size": 500 }
            ]
        };

        // Create the sunburst chart
        function createSunburstChart(data) {
            const width = 800, radius = width / 4;
            const svg = d3.select("#sunburst-chart")
                .attr("viewBox", [-width / 2, -width / 2, width, width]);

            const color = d3.scaleOrdinal(d3.quantize(d3.interpolateRainbow, data.children.length + 1));

            const root = d3.hierarchy(data).sum(d => d.size || 0);
            const partition = d3.partition().size([2 * Math.PI, root.height + 1]);
            partition(root);

            const arc = d3.arc()
                .startAngle(d => d.x0)
                .endAngle(d => d.x1)
                .padAngle(0.01)
                .padRadius(radius * 1.5)
                .innerRadius(d => d.y0 * radius)
                .outerRadius(d => Math.max(d.y0 * radius, d.y1 * radius - 1));

            const path = svg.append("g")
                .selectAll("path")
                .data(root.descendants().slice(1))
                .join("path")
                .attr("fill", d => color(d.data.name))
                .attr("d", arc)
                .on("click", (event, d) => drillDown(d))
                .on("mouseover", (event, d) => showTooltip(event, `${d.data.name}: ${d.value}`))
                .on("mouseout", hideTooltip);

            path.append("title").text(d => `${d.data.name}: ${d.value}`);

            function drillDown(node) {
                if (!node.children) return;
                root.each(d => d.target = {
                    x0: Math.max(0, Math.min(1, (d.x0 - node.x0) / (node.x1 - node.x0))) * 2 * Math.PI,
                    x1: Math.max(0, Math.min(1, (d.x1 - node.x0) / (node.x1 - node.x0))) * 2 * Math.PI,
                    y0: Math.max(0, d.y0 - node.depth),
                    y1: Math.max(0, d.y1 - node.depth),
                });
                const t = svg.transition().duration(750);
                path.transition(t).attrTween("d", d => () => arc(d.target));
            }
        }

        function showTooltip(event, text) {
            const tooltip = d3.select("#tooltip");
            tooltip.style("visibility", "visible")
                .style("left", `${event.pageX + 10}px`)
                .style("top", `${event.pageY + 10}px`)
                .text(text);
        }

        function hideTooltip() {
            d3.select("#tooltip").style("visibility", "hidden");
        }

        // Initialize charts
        createSunburstChart(sunburstData);
    </script>
</body>
</html>
